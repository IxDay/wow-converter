name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          for bin in convert list server; do
            cp target/${{ matrix.target }}/release/$bin dist/${bin}-${{ matrix.suffix }}
          done

      - name: Package binaries (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          foreach ($bin in "convert","list","server") {
            Copy-Item "target/${{ matrix.target }}/release/$bin.exe" "dist/${bin}-${{ matrix.suffix }}.exe"
          }
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
